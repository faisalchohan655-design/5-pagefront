# ============================================
# LEADAI - NETLIFY CONFIGURATION
# ============================================

[build]
  # Build command
  command = "npm run build"
  
  # Publish directory (where the built files are)
  publish = "build"
  
  # Node.js version
  node_version = "18"

[build.environment]
  # Disable ESLint warnings as errors
  CI = "false"
  
  # Environment variables
  REACT_APP_API_URL = "https://4-pageback-production.up.railway.app"
  REACT_APP_ENVIRONMENT = "production"
  REACT_APP_ENABLE_AI_SCORING = "true"
  REACT_APP_ENABLE_EMAIL_EXTRACTOR = "true"
  REACT_APP_ENABLE_WHATSAPP = "true"
  REACT_APP_ENABLE_BULK_OPERATIONS = "true"
  REACT_APP_APP_NAME = "LeadAI"
  REACT_APP_APP_VERSION = "1.0.0"
  REACT_APP_COMPANY_NAME = "LeadConnect Pro"
  REACT_APP_SHOW_DEBUG_TOOLS = "false"
  REACT_APP_SHOW_SIDEBAR = "true"
  REACT_APP_DEFAULT_THEME = "dark"
  REACT_APP_DEFAULT_PAGE_SIZE = "20"
  REACT_APP_MAX_PAGE_SIZE = "100"
  REACT_APP_API_TIMEOUT = "30000"
  REACT_APP_MAX_FILE_SIZE = "10485760"
  REACT_APP_ALLOWED_FILE_TYPES = ".xlsx,.xls,.csv"

# ============================================
# REDIRECTS & REWRITES (SPA Support)
# ============================================

[[redirects]]
  # Handle SPA routing - all routes go to index.html
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  # 404 page redirect
  from = "/404.html"
  to = "/index.html"
  status = 200

[[redirects]]
  # API proxy (if needed)
  from = "/api/*"
  to = "https://4-pageback-production.up.railway.app/api/:splat"
  status = 200
  force = true

# ============================================
# HEADERS (Security & Performance)
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # CORS Headers
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Origin, X-Requested-With, Content-Type, Accept, Authorization"

[[headers]]
  for = "/*.js"
  [headers.values]
    # Cache static JS files
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    # Cache static CSS files
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    # Cache static assets
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Don't cache HTML
    Cache-Control = "no-cache, no-store, must-revalidate"

